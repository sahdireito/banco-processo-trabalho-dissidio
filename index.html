<script>
const QUESTOES = [
  {num:1, exame:"XLIII Exame — 2025", titulo:"Perempção no Processo do Trabalho", enunciado:"José Luiz ajuizou reclamação trabalhista em face de Lojas Internacionais Ltda., pleiteando verbas resilitórias e horas extras. No dia da audiência, apesar de regularmente notificado, José Luiz injustificadamente não compareceu. Seu advogado, presente, requereu a dispensa de custas pela gratuidade de justiça, o que foi deferido pelo Juiz. Ação idêntica foi ajuizada um mês após o fato, e, de novo, José Luiz injustificadamente não compareceu. Uma hora após a audiência, ele compareceu à sala de audiência e disse ao Juiz que dormira demais, perdendo a hora. Foi juntada certidão do fato ao processo, no qual, novamente, foi acolhido o seu requerimento de gratuidade de justiça. As duas ações anteriormente ajuizadas foram extintas sem resolução do mérito. Agora, você foi procurado por José Luiz para, como advogado, ajuizar outra ação idêntica.", comando:"Sobre as consequências das ausências de José Luiz para o ajuizamento de outra demanda, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Ocorrerá a confissão do autor.", "B": "Não há penalidade, já que José Luiz, em ambas as situações, foi dispensado do pagamento das custas.", "C": "José Luiz incorrerá na pena da perempção, perdendo, pelo prazo de seis meses, o direito de reclamar perante a Justiça do Trabalho.", "D": "José Luiz poderá reclamar imediatamente, mas, independentemente, da prescrição parcial quinquenal, será descontado do prazo da sua reclamação o período de seis meses."}, fb:{"A": "Incorreta. Não houve instrução processual para gerar confissão — José Luiz simplesmente não compareceu às audiências.", "B": "Incorreta. A gratuidade de justiça afasta o pagamento das custas processuais, mas não impede a incidência da perempção. São institutos distintos e independentes.", "C": "Correta! Art. 732, CLT: quando o reclamante der causa ao arquivamento da reclamação por duas vezes consecutivas, ficará impedido de reclamar perante a Justiça do Trabalho pelo prazo de seis meses. No caso: duas ausências injustificadas + dois arquivamentos = perempção de 6 meses.", "D": "Incorreta. Não existe previsão de desconto de 6 meses no prazo prescricional. A consequência é o impedimento total de ajuizar nova reclamação pelo período."}, fund:"Art. 732, CLT: na hipótese de serem arquivados dois processos, dentro de 6 meses, em razão de ausência injustificada do reclamante, este ficará impedido de pleitear na Justiça do Trabalho pelo prazo de 6 meses.", caqui:"Perempção trabalhista = punição por dois arquivamentos seguidos. O reclamante faltou duas vezes sem justificativa = dois arquivamentos = seis meses de impedimento. A gratuidade de justiça não tem nada a ver com isso — ela afasta custas, não a perempção. A banca gosta de colocar a gratuidade como 'salvo-conduto', mas não é."},
  {num:2, exame:"42º Exame — 2024", titulo:"Homologação de Acordo Extrajudicial — Advogado Comum", enunciado:"Foi protocolizada petição de homologação de acordo extrajudicial à 200ª Vara do Trabalho de Florianópolis. As partes envolvidas são Luísa, empregada doméstica, e José Pedro, seu ex-empregador. O valor apresentado para o acordo é de R$ 27.000,00, pagos em duas parcelas iguais e sucessivas, sendo mantidas as anotações na CTPS de Luísa. Empregada e empregador estão representados pelo mesmo advogado.", comando:"Sobre esses fatos, segundo os termos da CLT, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Não é possível a homologação, porque as partes não podem ser representadas pelo mesmo advogado.", "B": "Na homologação de acordo extrajudicial, os empregados precisam ser assistidos pelo advogado do seu sindicato de classe.", "C": "Contanto que ambas as partes ratifiquem perante o Juiz o desejo de realizar a transação, o acordo deve ser homologado pelo Magistrado.", "D": "Tratando-se de um procedimento especial de jurisdição voluntária, o Juiz não pode negar a homologação de acordo alegando vício formal."}, fb:{"A": "Correta! Art. 855-B, §2º, CLT: as partes devem ser representadas por advogados distintos no procedimento de homologação de acordo extrajudicial. O advogado comum é expressamente proibido. Aqui Luísa e José Pedro têm o mesmo advogado = obstáculo legal à homologação.", "B": "Incorreta. A CLT não exige que o advogado seja do sindicato — apenas que as partes tenham advogados distintos.", "C": "Incorreta. A mera ratificação não obriga o juiz a homologar. O magistrado pode (e deve) analisar a regularidade formal e material do acordo.", "D": "Incorreta. O juiz pode rejeitar a homologação por vícios formais ou materiais. A jurisdição voluntária não elimina o controle judicial."}, fund:"Art. 855-B, §2º, CLT: não se tratando de ato ilícito, o magistrado observará a autonomia privada dos envolvidos; entretanto, é obrigatória a representação por advogados distintos, vedado expressamente o advogado comum.", caqui:"Acordo extrajudicial trabalhista = um advogado para cada lado. Essa é a regra mais cobrada desse tema. A CLT proíbe advogado comum porque existe potencial conflito de interesses entre empregado e empregador. O juiz não é obrigado a homologar — ele analisa se o acordo está regular. E o advogado do sindicato não é obrigatório."},
  {num:3, exame:"XXXVIII Exame — 2023", titulo:"Homologação de Transação Extrajudicial — Requisitos", enunciado:"Leonardo Pereira e Panificação Pão Fresquinho Ltda. decidiram, amigavelmente, encerrar a relação de emprego mantida entre eles. Porém, as verbas rescisórias não eram incontroversas, uma vez que discutiam diferenças de horas extras e reflexos; trabalho em feriados e reflexos; intervalo para alimentação e descanso; além de adicional de insalubridade. Sendo assim, após muito conversarem, chegaram a um bom termo. Contudo, para segurança jurídica de ambos, gostariam que a avença fosse chancelada pela Justiça do Trabalho.", comando:"Para isso, de acordo com o texto da CLT em vigor, as partes deverão", gabarito:"C", alt:{"A": "fazer uso do jus postulandi e ajuizar uma reclamação trabalhista do empregado em face do empregador com todos os pedidos, e, no dia designado para a audiência, deverão comparecer e celebrar o acordo.", "B": "fazer uso do jus postulandi e dar entrada no processo de homologação de transação extrajudicial em petição conjunta e aguardar a homologação do juiz.", "C": "estar representadas por advogados independentes que darão entrada em petição conjunta do processo de homologação de transação extrajudicial.", "D": "estar representadas por advogado, que poderá ser comum a ambas, e darão entrada em petição conjunta do processo de homologação de transação extrajudicial."}, fb:{"A": "Incorreta. Não é necessário ajuizar uma reclamação trabalhista tradicional. A CLT criou o procedimento específico de homologação de acordo extrajudicial exatamente para evitar isso.", "B": "Incorreta. O jus postulandi NÃO se aplica ao procedimento de homologação de acordo extrajudicial. As partes precisam estar representadas por advogados.", "C": "Correta! Arts. 855-B a 855-E, CLT: o procedimento de homologação de acordo extrajudicial exige: (1) petição conjunta; (2) representação por advogados independentes (distintos). Advogado comum é proibido.", "D": "Incorreta. Advogado comum é expressamente vedado pela CLT nesse procedimento."}, fund:"Arts. 855-B a 855-E, CLT: o processo de homologação de acordo extrajudicial deve ser proposto em petição conjunta, com as partes obrigatoriamente representadas por advogados distintos. Veda-se o advogado comum e o jus postulandi.", caqui:"Dois erros clássicos que a banca coloca: jus postulandi (não cabe aqui) e advogado comum (proibido). A receita certa para homologar acordo extrajudicial trabalhista: petição conjunta + cada parte com seu advogado. Sem sindicato obrigatório, sem jus postulandi, sem advogado único."},
  {num:4, exame:"XXXVIII Exame — 2023", titulo:"Ausência do Reclamante em Audiência de Prosseguimento", enunciado:"Pedro Arnaldo ajuizou reclamação trabalhista em face da ex-empregadora. No dia da audiência, rejeitada a possibilidade de acordo, o feito foi contestado. A parte ré, porém, requereu o adiamento em razão da ausência de uma testemunha, que estava intimada regularmente. Na audiência seguinte Pedro Arnaldo, sem qualquer justificativa, não compareceu.", comando:"Diante disso, nos termos da CLT e do entendimento jurisprudencial consolidado do TST, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A ausência do reclamante, quando adiada a instrução após contestada a ação em audiência, não importa arquivamento do processo.", "B": "A ausência do reclamante importará no arquivamento do feito na hipótese.", "C": "O feito deverá ser novamente adiado para o comparecimento do reclamante, que não deu causa ao adiamento anterior.", "D": "Ausente o interesse de agir, o feito deverá ser extinto sem resolução do mérito."}, fb:{"A": "Correta! Súmula 9, TST: a ausência do reclamante em audiência de prosseguimento (após a contestação já ter sido apresentada) não gera arquivamento da reclamação. O arquivamento só ocorre na audiência inaugural, antes da contestação.", "B": "Incorreta. O arquivamento por ausência do reclamante ocorre apenas na audiência inicial (antes da contestação). Após a contestação, a ausência pode gerar confissão ficta, mas não arquivamento.", "C": "Incorreta. Não há obrigação de novo adiamento. O processo prossegue, podendo o juiz julgar com base nas provas existentes.", "D": "Incorreta. Ausência de interesse de agir não é a consequência jurídica da situação."}, fund:"Súmula 9, TST: a ausência do reclamante em audiência, quando adiada a instrução após contestada a ação, não importa arquivamento do processo. Aplica-se o disposto nos arts. 843 e 844 da CLT por analogia restrita à fase de instrução.", caqui:"Regra fundamental: arquivamento por ausência do reclamante só acontece na PRIMEIRA audiência (antes da contestação). Depois que o réu contestou, o processo 'ganhou vida própria'. Se o reclamante sumir depois disso, pode levar confissão ficta — mas não arquivamento. A Súmula 9 TST é clara nesse ponto."},
  {num:5, exame:"XXXVII Exame — 2023", titulo:"Incidente de Desconsideração da Personalidade Jurídica — Fases Cabíveis", enunciado:"Arthur ajuizou reclamação trabalhista em face de seu ex-empregador — a sociedade empresária Alfa — e dos 3 sócios dela, valendo-se do incidente de desconsideração da personalidade jurídica (IDPJ) na fase de cognição. Argumentou na petição inicial que assim procedeu para que, em havendo sucesso na pretensão, os sócios já constem do título executivo judicial, o que abreviaria a futura execução.", comando:"Diante da situação retratada e da previsão contida na CLT, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "O incidente de desconsideração da personalidade jurídica (IDPJ), na Justiça do Trabalho, somente pode ser feito na fase de execução.", "B": "O incidente de desconsideração da personalidade jurídica (IDPJ), na seara trabalhista, pode ser feito na fase de conhecimento ou de execução.", "C": "O incidente de desconsideração da personalidade jurídica (IDPJ) na fase de conhecimento dependerá da concordância dos sócios.", "D": "A opção pelo incidente de desconsideração da personalidade jurídica (IDPJ), por exigência expressa da CLT, deve ter, na fase de conhecimento, sua necessidade provada por documentos."}, fb:{"A": "Incorreta. A CLT não restringe o IDPJ à fase de execução — ele pode ser instaurado na fase de conhecimento ou na execução.", "B": "Correta! Art. 855-A, CLT: o IDPJ pode ser instaurado na fase de conhecimento ou na fase de execução. Incluir os sócios desde o conhecimento para que constem do título executivo é estratégia processual válida e expressamente permitida.", "C": "Incorreta. O IDPJ não depende da concordância dos sócios — eles são citados para se manifestar, mas sua concordância não é condição para o incidente.", "D": "Incorreta. Não existe na CLT exigência específica de prova documental para o IDPJ na fase de conhecimento."}, fund:"Art. 855-A, CLT: aplica-se ao processo do trabalho o incidente de desconsideração da personalidade jurídica previsto nos arts. 133 a 137 do CPC. O incidente pode ser instaurado em qualquer fase do processo, inclusive no conhecimento.", caqui:"IDPJ trabalhista: pode ser pedido em qualquer fase — conhecimento ou execução. A estratégia de pedir no conhecimento é inteligente: se ganhar, os sócios já entram no título executivo, facilitando a futura execução. Não precisa de concordância dos sócios e não tem exigência documental específica na CLT."},
  {num:6, exame:"XXXVII Exame — 2023", titulo:"Prioridade de Tramitação Processual", enunciado:"Pedro, Luzia e Rogério são empregados da sociedade empresária ABC e ajuizaram reclamação trabalhista individual contra ela. Pedro tem 55 anos de idade e postula na sua ação horas extras; Luzia tem 42 anos de idade e em sua ação requer o pagamento de 2 períodos de férias vencidas; Rogério tem 34 anos de idade e, na sua demanda, postula o pagamento dos salários retidos dos últimos 2 meses de trabalho. Em razão do alto salário que os três empregados recebiam, todas as ações tramitam pelo rito ordinário.", comando:"A respeito dessas reclamações trabalhistas, assinale a opção que indica, de acordo com a CLT, a(as) que terá(ão) preferência na tramitação processual.", gabarito:"A", alt:{"A": "A de Rogério.", "B": "A de Luzia.", "C": "A de Pedro.", "D": "A de Luzia e a de Pedro."}, fb:{"A": "Correta! A CLT prevê prioridade para processos que versam sobre crédito de natureza alimentar, especialmente salários. Rogério pleiteia salários retidos — crédito alimentar direto. Além disso, a CLT estabelece preferência para causas com créditos salariais. A prioridade por idade (60 anos ou mais) não beneficia Pedro, que tem apenas 55 anos.", "B": "Incorreta. Férias vencidas não possuem a mesma prioridade que créditos salariais diretos (salários retidos).", "C": "Incorreta. Pedro tem 55 anos — a prioridade por idade existe para maiores de 60 anos. Horas extras também não têm prioridade especial.", "D": "Incorreta. Nem Luzia (férias) nem Pedro (55 anos, horas extras) possuem as condições de prioridade que Rogério (salários retidos) possui."}, fund:"Art. 852-H, parágrafo único, CLT: a CLT prevê preferência para processos que versam sobre créditos de natureza alimentar urgente, especialmente salários retidos. A prioridade por idade (art. 71, Estatuto do Idoso) é para maiores de 60 anos.", caqui:"Salário retido = prioridade máxima. Rogério não tem 60 anos para ganhar prioridade etária, mas pleiteia salários dos últimos 2 meses — crédito alimentar urgente que a CLT privilegia. Pedro tem 55 anos (precisa de 60+) e pede horas extras (não são crédito imediato). Luzia pede férias (sem prioridade especial)."},
  {num:7, exame:"XLVI Exame — 2026", titulo:"Trabalho do Menor — Regras e Vedações", enunciado:"Uma Organização não Governamental está realizando uma série de parcerias com entidades privadas visando à inserção e ao aprendizado de menores no mercado de trabalho, a fim de estimular o primeiro emprego, bem como evitar os riscos de envolvimento com a criminalidade. Diante disso, consultou você, na qualidade de advogado, a respeito do trabalho do menor como empregado.", comando:"Assinale a opção que apresenta, corretamente, a sua orientação sobre o caso.", gabarito:"D", alt:{"A": "É permitido ao menor de 18 e maior de 16 anos, o trabalho em bilheterias em cinemas e teatros, das 22 às 24 horas, a fim de não gerar prejuízo à frequência escolar.", "B": "É permitido ao maior de 16 anos e menor de 18 anos, o trabalho como frentista em postos de gasolina.", "C": "É permitido ao menor o trabalho em quiosques da orla das praias destinados à venda de comidas de todo o gênero e bebidas alcoólicas e não alcoólicas.", "D": "É permitido ao menor, a partir de 14 anos, trabalhar na condição de aprendiz."}, fb:{"A": "Incorreta. O trabalho noturno (entre 22h e 5h) é vedado ao menor de 18 anos — art. 7º, XXXIII, CF + arts. 402 e 403, CLT. Não importa se o horário é das 22h às 24h.", "B": "Incorreta. Trabalho em postos de combustíveis envolve contato com inflamáveis e agentes perigosos — vedado ao menor de 18 anos (trabalho perigoso, art. 405, CLT).", "C": "Incorreta. A venda e o manuseio de bebidas alcoólicas por menores são expressamente proibidos. Trabalho em ambiente com bebidas alcoólicas = vedado ao menor de 18 anos (art. 405, CLT).", "D": "Correta! Art. 7º, XXXIII, CF: é proibido qualquer trabalho ao menor de 16 anos, SALVO na condição de aprendiz, a partir dos 14 anos. Esta é a exceção constitucional expressa."}, fund:"Art. 7º, XXXIII, CF: proibição de trabalho noturno, perigoso ou insalubre ao menor de 18 anos e de qualquer trabalho ao menor de 16 anos, SALVO na condição de aprendiz, a partir dos 14 anos. Arts. 402-405, CLT: regulam as vedações ao trabalho do menor.", caqui:"Três proibições absolutas para o menor de 18 anos: trabalho noturno (após 22h), trabalho perigoso (inflamáveis, postos de gasolina) e trabalho insalubre. E a exceção constitucional clássica: menor de 16 anos NÃO trabalha, EXCETO como aprendiz a partir dos 14 anos. É a única hipótese que a CF abre."},
  {num:8, exame:"XLVI Exame — 2026", titulo:"Equiparação Salarial — Readaptado como Paradigma", enunciado:"Paulo foi contratado pela sociedade empresária Novos Horizontes para exercer a função de técnico em informática. João trabalha no mesmo setor e, por força de readaptação, exerce a mesma função de Paulo há seis meses. Luciana foi contratada um ano depois de Paulo, e ambos exercem a mesma função, não havendo diferença no trabalho realizado pelos três empregados. A sociedade empresária não tinha pessoal organizado em quadro de carreira, e o trabalho era distribuído entre os três indistintamente. Contudo, João recebia R$ 600,00 a mais que Paulo, que, por sua vez recebia R$ 500,00 a mais de salário que Luciana.", comando:"Você foi consultado por Luciana acerca da diferença salarial. Assinale a opção que apresenta a resposta correta.", gabarito:"D", alt:{"A": "A diferença salarial não se justifica em nenhuma das hipóteses, cabendo a equiparação ao salário de maior valor.", "B": "Paulo pode ganhar mais que Luciana pelo fato de ser homem, mas, em relação a João, a diferença salarial é injustificável.", "C": "Paulo pode ganhar mais que Luciana em razão do tempo na função, que é a razão de Luciana não fazer jus ao mesmo salário que João.", "D": "A diferença salarial de Luciana em relação a Paulo não se justifica, pelo que os dois deveriam receber o mesmo salário, mas no caso de João, por ser readaptado, a diferença salarial é cabível."}, fb:{"A": "Incorreta. João é readaptado — não pode ser paradigma para equiparação salarial (art. 461, §4º, CLT). A diferença salarial em relação a João é juridicamente justificável.", "B": "Incorreta. Diferença salarial por sexo é inconstitucional (art. 7º, XXX, CF) e ilegal (Lei 14.611/2023 — Lei da Igualdade Salarial).", "C": "Incorreta. Luciana foi contratada apenas 1 ano depois de Paulo — diferença inferior a 2 anos, não impedindo a equiparação salarial.", "D": "Correta! Art. 461, CLT + Súmula 6, TST: Luciana x Paulo = mesma função, diferença temporal < 2 anos = equiparação cabível. Luciana x João: João é readaptado = não pode ser paradigma = diferença salarial é válida."}, fund:"Art. 461, CLT: equiparação salarial exige mesma função, mesmo empregador, igual produtividade e perfeição técnica, diferença de tempo na função não superior a 2 anos. Art. 461, §4º, CLT: o empregado readaptado não serve como paradigma para equiparação salarial.", caqui:"Readaptado = trava de paradigma. Este é o ponto central. Luciana x Paulo: 1 ano de diferença (dentro do limite de 2 anos) = equiparação possível. Luciana x João: João é readaptado = não pode ser paradigma. Diferença por sexo: inconstitucional. A banca colocou essa questão duas vezes em 2026 — é tema muito quente!"},
  {num:9, exame:"XXXVI Exame — 2022", titulo:"Recurso Contra Homologação de Acordo Trabalhista — INSS", enunciado:"Na audiência de uma reclamação trabalhista, estando as partes presentes e assistidas por seus respectivos advogados, foi homologado pelo juiz um acordo no valor de R$ 50.000,00, tendo sido atribuído ao valor a natureza indenizatória, com as parcelas devidamente identificadas. O reclamante e o INSS, cinco dias após, interpuseram recurso ordinário contra a decisão de homologação do acordo: o reclamante, dizendo-se arrependido quanto ao valor; o INSS, insurgindo-se contra a indicação de todo o valor acordado como tendo natureza indenizatória, prejudicando a autarquia previdenciária quanto ao recolhimento da contribuição previdenciária.", comando:"Diante do caso apresentado e nos termos da CLT, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Tanto o reclamante quanto o INSS podem recorrer da decisão homologatória, e seus recursos terão o mérito apreciado.", "B": "No caso, somente o reclamante poderá recorrer, porque o INSS não tem legitimidade para recorrer de recursos, já que não foi parte.", "C": "Somente o INSS pode recorrer, porque, para o reclamante, o acordo valerá como decisão irrecorrível.", "D": "Nenhuma das partes nem o INSS podem recorrer contra o acordo, porque a homologação na Justiça do Trabalho é soberana."}, fb:{"A": "Incorreta. O reclamante não pode recorrer — o acordo homologado é irrecorrível para as partes.", "B": "Incorreta. O INSS TEM legitimidade recursal expressamente prevista na CLT para discutir contribuições previdenciárias. E o reclamante não pode recorrer.", "C": "Correta! Art. 831, parágrafo único, CLT + Súmula 259, TST: o acordo homologado na Justiça do Trabalho é irrecorrível para as partes. Porém, o INSS tem legitimidade específica para recorrer quando discute a natureza das parcelas e seu reflexo nas contribuições previdenciárias.", "D": "Incorreta. Embora seja irrecorrível para as partes, o INSS pode e deve recorrer sobre questões previdenciárias."}, fund:"Art. 831, parágrafo único, CLT: o termo de conciliação valerá como decisão irrecorrível, salvo para a Previdência Social quanto às contribuições que lhe forem devidas. Súmula 259, TST: somente por ação rescisória é impugnável o termo de conciliação previsto no parágrafo único do art. 831 da CLT.", caqui:"Acordo homologado na JT = irrecorrível para as partes (reclamante e reclamada). Mas existe uma exceção importantíssima: o INSS pode recorrer quando discute a natureza das parcelas (salarial ou indenizatória) que afeta o recolhimento previdenciário. Aqui o INSS contesta que todo o valor foi classificado como indenizatório — prejudicando suas contribuições. Recurso do INSS: cabe. Recurso do reclamante arrependido: não cabe."},
  {num:10, exame:"XXXVI Exame — 2022", titulo:"Recurso Contra Decisão que Julga Improcedente o IDPJ na Execução", enunciado:"No bojo de uma execução trabalhista, o juízo, a requerimento da exequente, utilizou todas as ferramentas tecnológicas disponíveis para tentar apreender dinheiro ou bens do executado, não tendo sucesso. O juízo, também a requerimento da exequente, deferiu a instauração do incidente de desconsideração da personalidade jurídica (IDPJ) em face dos sócios, que foram citados e se manifestaram. Diante dos argumentos apresentados, o IDPJ foi julgado improcedente, isentando os sócios de qualquer responsabilidade.", comando:"Considerando a situação de fato e a previsão legal, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A exequente poderá interpor recurso de agravo de petição.", "B": "Não caberá recurso da decisão em referência por ser interlocutória.", "C": "Caberá à exequente, se desejar, interpor recurso ordinário.", "D": "A exequente poderá interpor agravo de instrumento."}, fb:{"A": "Correta! Art. 855-A, §1º, II, CLT: da decisão que resolve o incidente de desconsideração da personalidade jurídica na fase de execução cabe agravo de petição. Este é o recurso específico para decisões proferidas na fase executória trabalhista.", "B": "Incorreta. Embora normalmente decisões interlocutórias não sejam recorríveis de imediato, a CLT criou exceção expressa para o IDPJ na execução — cabe agravo de petição.", "C": "Incorreta. Recurso ordinário é o recurso cabível contra sentença definitiva em processo de conhecimento — não contra decisão na fase de execução.", "D": "Incorreta. Agravo de instrumento trabalhista é cabível contra decisão denegatória de seguimento de recurso, não contra decisão de IDPJ na execução."}, fund:"Art. 855-A, §1º, II, CLT: na fase de execução, da decisão proferida pelo juízo sobre o incidente de desconsideração da personalidade jurídica caberá agravo de petição, independentemente de garantia do juízo.", caqui:"IDPJ na execução = agravo de petição. Esta é a regra expressa da CLT. Na fase de conhecimento, a decisão do IDPJ é interlocutória (sem recurso imediato). Na execução, há previsão específica: agravo de petição. A banca adora confundir com agravo de instrumento (errado) ou recurso ordinário (fase de conhecimento)."},
  {num:11, exame:"XXXVI Exame — 2022", titulo:"Desistência da Reclamação Após Apresentação da Contestação", enunciado:"Amanda ajuizou reclamação trabalhista contra a Sociedade Empresária Brinquedos Infantis Ltda., na qual atuou como caixa durante 7 meses. A reclamada foi citada e apresentou defesa sem sigilo no sistema PJe, com os documentos correspondentes, 2 dias antes da audiência. No dia da audiência, feita a tentativa de conciliação sem sucesso, a juíza recebeu formalmente a defesa e concedeu vista à advogada da autora. Após analisar a contestação, a advogada de Amanda requereu a desistência da reclamação trabalhista, sem a concordância do advogado da reclamada.", comando:"Considerando a situação e as normas previstas na CLT, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A desistência pode ser homologada, porque requerida antes do início da instrução.", "B": "O requerimento deve ser homologado pelo magistrado, uma vez que a desistência jamais depende da concordância do reclamado.", "C": "A desistência não poderá ser homologada, porque tendo a contestação sido oferecida, a desistência depende da concordância do reclamado.", "D": "O requerimento não pode ser atendido, porque tanto a desistência quanto a renúncia dependem de aquiescência do reclamado se a defesa tiver sido apresentada sem sigilo."}, fb:{"A": "Incorreta. O critério determinante não é o início da instrução, mas sim o oferecimento da contestação. A defesa foi protocolada no PJe antes da audiência = contestação já oferecida.", "B": "Incorreta. Após a apresentação da contestação, a desistência da ação depende sim da concordância do reclamado.", "C": "Correta! Art. 841, §3º, CLT: quando a contestação é protocolada no sistema eletrônico (PJe), considera-se que a defesa foi oferecida. Após isso, a desistência da ação depende da concordância do reclamado (aplicação do art. 485, §4º, CPC subsidiariamente). O réu não concordou = desistência não pode ser homologada.", "D": "Incorreta. A renúncia ao direito material não depende da concordância do réu — só a desistência da ação depende da anuência após a contestação."}, fund:"Art. 841, §3º, CLT (Reforma 2017): considerando-se oferecida a contestação protocolada no sistema de processo eletrônico. Art. 485, §4º, CPC (aplicação subsidiária): a desistência da ação após a apresentação da contestação depende da concordância do réu.", caqui:"Regra dupla: (1) Contestação no PJe = contestação oferecida, mesmo antes da audiência. (2) Depois da contestação, desistência precisa do aval do réu. Aqui a reclamada juntou a defesa no PJe dois dias antes — contestação oferecida. Amanda quer desistir mas a reclamada não concorda = não pode. Atenção: RENÚNCIA ao direito é diferente de DESISTÊNCIA da ação — só a desistência precisa de concordância."},
  {num:12, exame:"XXXIV Exame — 2022", titulo:"Prazo Mínimo Entre a Citação e a Audiência", enunciado:"Em 7 de fevereiro de 2022 (uma segunda-feira), Carlos ajuizou reclamação trabalhista pelo rito ordinário contra a Sociedade Empresária Calçados Ícaro Ltda. A Vara para a qual o processo foi sorteado é extremamente organizada, tendo comprovadamente ocorrido a citação em 9 de fevereiro (quarta-feira) e designada a audiência una para o dia 11 de fevereiro (sexta-feira). Todos os dias da referida semana são úteis.", comando:"Diante dos fatos e do que dispõe a CLT, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A audiência deve ser remarcada, se houver pedido do reclamado, porque não se observou prazo mínimo de 5 dias úteis contados da citação.", "B": "A Justiça do Trabalho deve primar pela celeridade, daí porque a designação de audiência breve é válida, pois respeitado o prazo legal de 48 horas.", "C": "Inválida a data marcada para a audiência porque a Lei determina um interregno mínimo de 8 dias úteis contados da citação.", "D": "Se a audiência fosse na modalidade presencial não seria válida pelo curto espaço para deslocamento, mas se fosse telepresencial seria válida."}, fb:{"A": "Correta! Art. 841, CLT (Reforma 2017): a notificação do reclamado deve ser feita com pelo menos 5 dias úteis de antecedência à audiência. Citação: 09/02 (quarta). Audiência: 11/02 (sexta). Entre esses dias há apenas 2 dias úteis (quinta e sexta). Não se observou o prazo mínimo de 5 dias úteis = a audiência deve ser remarcada se o reclamado assim requerer.", "B": "Incorreta. O prazo de 48 horas era o antigo prazo revogado pela Reforma 2017. Atualmente o prazo mínimo é de 5 dias úteis.", "C": "Incorreta. O prazo legal é de 5 dias úteis — não 8 dias.", "D": "Incorreta. O prazo de 5 dias úteis se aplica tanto para audiência presencial quanto telepresencial."}, fund:"Art. 841, CLT: recebida e protocolada a reclamação, o escrivão ou o secretário, dentro de 48 horas, remeterá a segunda via da petição, ou o edital, ao reclamado, notificando-o ao mesmo tempo, para comparecer à audiência do julgamento, que será a primeira desimpedida, depois de 5 dias úteis.", caqui:"Após a Reforma 2017: o prazo mínimo entre a citação e a audiência é de 5 DIAS ÚTEIS. A banca coloca como distratores o antigo prazo de 48 horas (revogado) e 8 dias (inexistente). Aqui: citação quarta-feira (09/02), audiência sexta-feira (11/02) = apenas 2 dias úteis (quinta e sexta) = audiência inválida se o réu reclamar."},
  {num:13, exame:"XXXIII Exame — 2021", titulo:"Homologação de Acordo Extrajudicial — Advogados Distintos Obrigatórios", enunciado:"Duas irmãs costureiras trabalharam juntas em uma confecção. A mais velha era empregadora da mais nova, que gerenciava a atividade. Devido a um desentendimento em família, a irmã mais nova foi dispensada. Em decorrência da relação fraternal, chegaram a um bom termo sem a necessidade de ajuizamento da demanda. Porém, por segurança de ambas, gostariam de ver garantidos, judicialmente, os termos do acordo e procuraram você, como advogado consultor.", comando:"Diante disso, observados os termos da CLT, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Deverá ser distribuída uma petição requerendo a homologação de acordo extrajudicial, sendo que as partes deverão obrigatoriamente estar representadas por advogado, ainda que comum.", "B": "Deverá ser ajuizada uma ação trabalhista e realizado um acordo na primeira audiência, vigorando o jus postulandi.", "C": "Deverá ser distribuída uma petição requerendo a homologação de acordo extrajudicial, sendo que as partes não precisarão estar representadas por advogado, em razão do jus postulandi.", "D": "Deverá ser distribuída uma petição requerendo a homologação de acordo extrajudicial, sendo que as partes deverão obrigatoriamente estar representadas por advogados distintos."}, fb:{"A": "Incorreta. A CLT proíbe expressamente o advogado comum no procedimento de homologação de acordo extrajudicial.", "B": "Incorreta. Não há necessidade de ajuizar uma reclamação trabalhista tradicional. Existe o procedimento específico da homologação extrajudicial.", "C": "Incorreta. O jus postulandi NÃO se aplica ao procedimento de homologação de acordo extrajudicial. A representação por advogado é obrigatória.", "D": "Correta! Arts. 855-B a 855-E, CLT: o procedimento de homologação de acordo extrajudicial exige: (1) petição conjunta; (2) partes representadas por advogados distintos (obrigatório); (3) vedado o advogado comum; (4) sem jus postulandi."}, fund:"Art. 855-B, CLT: petição conjunta. Art. 855-C, CLT: o acordo não obriga a homologação. §2º do art. 855-B: é vedado ao advogado ser representante de ambas as partes. Sem jus postulandi nesse procedimento.", caqui:"Mesma regra, exame diferente. A CLT é cristalina: acordo extrajudicial trabalhista = (1) petição conjunta, (2) advogados DISTINTOS, (3) sem jus postulandi, (4) sem advogado comum. A banca continua cobrando esse tema porque muita gente confunde com outras situações trabalhistas onde o jus postulandi se aplica."},
  {num:14, exame:"XXXIII Exame — 2021", titulo:"Revelia e Defesa Protocolada no PJe", enunciado:"Maurício ajuizou reclamação trabalhista, em agosto de 2021, contra a sua ex-empregadora, a sociedade empresária Sorvetes Glacial Ltda., postulando o pagamento de horas extras e verbas resilitórias. No dia da audiência inaugural, feito o pregão com pontualidade, o autor compareceu acompanhado de seu advogado, estando ainda presente o advogado da empresa, mas ausente o preposto. O advogado do réu requereu que se aguardasse o prazo de 15 minutos, mas diante da negativa do advogado do autor, que não concordou em aguardar, teve início a audiência. O advogado do autor requereu a aplicação da revelia e o advogado do réu informou que havia protocolizado defesa com documentos pelo processo judicial eletrônico (PJe), requerendo que fossem recebidos.", comando:"Diante da situação e dos termos da CLT, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Deverá ser aplicada a revelia em razão da ausência do preposto e desprezada a defesa.", "B": "Há nulidade do ato porque a CLT determina que se aguarde a parte até 15 minutos após o horário designado.", "C": "Sendo a CLT omissa a respeito, caberá ao juiz definir se haverá revelia ou remarcação da audiência.", "D": "A defesa e os documentos apresentados devem ser aceitos."}, fb:{"A": "Incorreta. A revelia será declarada pela ausência do preposto — mas a defesa protocolada no PJe deve ser recebida e analisada. A CLT prevê exatamente isso.", "B": "Incorreta. A CLT não impõe ao juiz a obrigação de aguardar 15 minutos. O atraso não gera nulidade automática da audiência.", "C": "Incorreta. A CLT não é omissa — o art. 844, §5º, prevê expressamente que a defesa protocolada no PJe deve ser recebida mesmo na hipótese de revelia.", "D": "Correta! Art. 844, §5º, CLT (Reforma 2017): ainda que ocorra a revelia (pela ausência do preposto), se a contestação foi protocolada eletronicamente, ela deve ser recebida e os documentos analisados. Revelia ≠ desconsideração automática da defesa protocolada."}, fund:"Art. 844, §5º, CLT (Reforma 2017): ainda que ausente o reclamado, se a contestação já foi protocolada no sistema eletrônico, será recebida e os documentos analisados. A revelia não implica o desentranhamento da defesa eletrônica.", caqui:"A Reforma 2017 criou uma inovação importantíssima: empresa declarada revel por ausência do preposto, mas que já havia protocolado defesa no PJe = a defesa deve ser recebida. Não confunda: revelia (pela ausência) continua existindo, mas a defesa eletrônica não é jogada fora. O juiz analisa os dois: aplica revelia e lê a contestação. A banca adora essa pegadinha."},
  {num:15, exame:"XXXII Exame — 2021", titulo:"Rito Aplicável com Ente Público no Polo Passivo", enunciado:"Melissa era uma empregada terceirizada do setor de limpeza que atuou durante todo o seu contrato em uma sociedade de economia mista federal, que era a tomadora dos serviços (contratante). Após ter sido dispensada e não ter recebido nem mesmo as verbas resilitórias, Melissa ajuizou reclamação trabalhista contra o ex-empregador e contra a sociedade de economia mista federal, requerendo desta a responsabilidade subsidiária por ser tomadora dos serviços. O volume dos pedidos de Melissa alcança o valor de R$ 17.000,00.", comando:"Considerando os fatos narrados, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A ação tramitará pelo procedimento sumaríssimo, de modo que Melissa poderá conduzir, no máximo, duas testemunhas.", "B": "Diante do valor dos pedidos formulados, a reclamação deverá se submeter ao rito sumário e, da decisão que vier a ser proferida, não caberá recurso.", "C": "A reclamação adotará o rito especial misto e será possível a citação por edital caso o ex-empregador não seja localizado na fase de conhecimento.", "D": "A demanda observará rito ordinário, independentemente do valor do pedido de Melissa, pois um dos réus é ente público."}, fb:{"A": "Incorreta. A presença de ente público (sociedade de economia mista federal) no polo passivo afasta o rito sumaríssimo.", "B": "Incorreta. Não existe 'rito sumário' sem recurso para esse caso. E o valor, embora inferior a 40 salários mínimos, não basta para aplicar o sumaríssimo quando há ente público.", "C": "Incorreta. Não existe 'rito especial misto' previsto na CLT para essa situação.", "D": "Correta! Art. 852-A, parágrafo único, CLT: não se aplica o procedimento sumaríssimo quando o polo passivo da demanda compreende pessoa jurídica de direito público. A sociedade de economia mista federal é equiparada a ente público para fins processuais. Logo: rito ordinário."}, fund:"Art. 852-A, parágrafo único, CLT: ficam excluídas do procedimento sumaríssimo as demandas em que é parte a Administração Pública direta, autárquica e fundacional. Societades de economia mista federal são equiparadas para fins da exclusão do sumaríssimo pela jurisprudência trabalhista.", caqui:"A regra é simples: ente público no polo passivo = fora do sumaríssimo = rito ordinário. Não importa o valor (R$ 17.000 está abaixo dos 40 salários mínimos, mas isso não é suficiente). A presença da sociedade de economia mista afasta o sumaríssimo. A banca tentou confundir com rito sumário (inexistente aqui) e com rito especial misto (que não existe para esse caso)."},
  {num:16, exame:"XXXII Exame — 2021", titulo:"Recurso do Sócio Incluído na Execução por IDPJ", enunciado:"No decorrer de uma execução trabalhista, não se conseguiu penhorar nenhum bem da empresa executada nem reter qualquer numerário dela em ativos financeiros. Então, o exequente instaurou um incidente de desconsideração da personalidade jurídica para direcionar a execução em face de um sócio. O referido sócio foi citado e, no prazo de 15 dias, manifestou-se contrariamente à sua execução. Submetida a manifestação ao contraditório e não havendo outras provas a produzir, o juiz julgou procedente o incidente e incluiu o sócio no polo passivo da execução na condição de executado.", comando:"Considerando a situação retratada e os ditames da CLT, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Por ser interlocutória, essa decisão é irrecorrível, devendo o sócio se submeter ao comando e pagar a dívida.", "B": "O sócio em questão poderá recorrer da decisão independentemente de garantia do juízo.", "C": "Sendo a Lei omissa a respeito, caberá ao juiz definir se a decisão do incidente poderá ser objeto de recurso e se será necessário garantir o juízo.", "D": "O sócio poderá recorrer da decisão, mas terá de garantir o juízo em 50%."}, fb:{"A": "Incorreta. A CLT prevê recurso específico (agravo de petição) para a decisão do IDPJ na execução — não é irrecorrível.", "B": "Correta! Art. 855-A, §1º, II, CLT: da decisão que julga o IDPJ na fase de execução cabe agravo de petição, e o sócio recém-incluído pode recorrer independentemente de garantia do juízo. Exigir garantia antes de permitir a discussão inviabilizaria o contraditório.", "C": "Incorreta. A CLT não é omissa — há previsão expressa no art. 855-A.", "D": "Incorreta. Não existe exigência legal de garantir 50% do juízo para o recurso nessa hipótese específica."}, fund:"Art. 855-A, §1º, II, CLT: da decisão proferida na fase de execução sobre o incidente de desconsideração da personalidade jurídica caberá agravo de petição, independentemente de garantia do juízo. O sócio recém-incluído não precisa depositar para recorrer.", caqui:"IDPJ na execução: agravo de petição SEM necessidade de garantir o juízo. Isso porque o sócio está justamente discutindo se deve ou não integrar a execução. Seria contraditório obrigá-lo a depositar dinheiro da execução antes mesmo de discutir se é responsável. A banca coloca como pegadinha a exigência de garantia — mas não há essa exigência aqui."},
  {num:17, exame:"XXXI Exame — 2020", titulo:"Representação das Partes em Audiência Trabalhista", enunciado:"Você foi contratado para atuar nas seguintes ações trabalhistas: I. uma ação de cumprimento, como advogado da parte autora; II. uma reclamação plúrima, também como advogado da parte autora; III. uma reclamação trabalhista movida por João, ex-empregado de uma empresa, autor da ação; IV. uma reclamação trabalhista, por uma sociedade empresária, ré na ação.", comando:"Sobre essas ações, de acordo com a legislação trabalhista em vigor, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Tanto na ação de cumprimento como na ação plúrima, todos os empregados autores deverão obrigatoriamente estar presentes. O mesmo deve ocorrer com João. Já a sociedade empresária poderá se fazer representar por preposto não empregado da ré.", "B": "O sindicato de classe da categoria poderá representar os empregados nas ações plúrima e de cumprimento. João deverá estar presente, em qualquer hipótese, de forma obrigatória. A sociedade empresária tem que se fazer representar por preposto, que não precisa ser empregado da ré.", "C": "Nas ações plúrima e de cumprimento, a parte autora poderá se fazer representar pelo Sindicato da categoria. João deverá estar presente, mas, por doença ou motivo ponderoso comprovado, poderá se fazer representar por empregado da mesma profissão ou pelo seu sindicato. Na ação em face da sociedade empresária, o preposto não precisará ser empregado da ré.", "D": "O sindicato da categoria poderá representar os empregados nas ações plúrima e de cumprimento. João deverá estar presente, mas, por doença ou motivo ponderoso comprovado, poderá se fazer representar por empregado da mesma profissão ou pelo seu sindicato. Na ação em face da sociedade empresária, o preposto deverá, obrigatoriamente, ser empregado da ré."}, fb:{"A": "Incorreta. Nas ações plúrima e de cumprimento, o sindicato pode representar os empregados — não há obrigatoriedade de comparecimento individual de todos.", "B": "Incorreta. João pode ser substituído por motivo ponderoso comprovado. Mas a sociedade empresária pode ter preposto não empregado (Reforma 2017).", "C": "Correta! (1) Ações plúrima e de cumprimento: sindicato pode representar os empregados. (2) João: deve comparecer, mas pode ser substituído por doença ou motivo ponderoso (empregado da mesma profissão ou sindicato). (3) Preposto da sociedade empresária: após a Reforma 2017, não precisa ser empregado da ré (art. 843, §3º, CLT).", "D": "Incorreta. A Reforma 2017 eliminou a exigência de o preposto ser empregado da reclamada (art. 843, §3º, CLT)."}, fund:"Art. 843, CLT: nas ações plúrimas e de cumprimento, o sindicato pode representar os empregados. Nas demais, o reclamante deve comparecer. Art. 843, §3º, CLT (Reforma 2017): o preposto não precisa ser empregado da parte reclamada. Art. 843, §1º, CLT: o reclamante pode ser substituído por motivo ponderoso.", caqui:"Três regras em uma questão: (1) Ação plúrima e de cumprimento: sindicato representa. (2) Reclamante pessoa física: deve comparecer, mas se tiver doença ou motivo ponderoso comprovado, pode mandar empregado da mesma profissão ou sindicato. (3) Preposto da empresa: desde a Reforma 2017, não precisa ser empregado. Esta última é a maior mudança e a que mais cai."},
  {num:18, exame:"XXXI Exame — 2020", titulo:"Homologação de Acordo Extrajudicial — Advogados Distintos", enunciado:"José da Silva, que trabalhou em determinada sociedade empresária de 20/11/2018 a 30/04/2019, recebeu apenas parcialmente as verbas rescisórias, não tendo recebido algumas horas extras e reflexos. A sociedade empresária pretende pagar ao ex-empregado o que entende devido, mas também quer evitar uma possível ação trabalhista.", comando:"Sobre a hipótese, na qualidade de advogado da sociedade empresária, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Deverá ser indicado e custeado um advogado para o empregado, a fim de que seja ajuizada uma ação para, então, comparecerem para um acordo, que já estará previamente entabulado no valor pretendido pela empresa.", "B": "Deverá ser instaurado um processo de homologação de acordo extrajudicial, proposto em petição conjunta, mas com cada parte representada obrigatoriamente por advogado diferente.", "C": "Deverá ser instaurado um processo de homologação de acordo extrajudicial, proposto em petição conjunta, mas cada parte poderá ser representada por advogado, ou não, já que, na Justiça do Trabalho, vigora o jus postulandi.", "D": "Deverá ser instaurado um processo de homologação de acordo extrajudicial, proposto em petição conjunta, mas com advogado único representando ambas as partes, por se tratar de acordo extrajudicial."}, fb:{"A": "Incorreta. Não há necessidade de ajuizar uma reclamação trabalhista fictícia. O procedimento adequado é diretamente a homologação de acordo extrajudicial.", "B": "Correta! Art. 855-B, CLT: o processo de homologação de acordo extrajudicial deve ser proposto em petição conjunta, com cada parte obrigatoriamente representada por advogado próprio (distintos). Advogado comum é vedado.", "C": "Incorreta. O jus postulandi não se aplica ao procedimento de homologação de acordo extrajudicial — a representação por advogado é obrigatória.", "D": "Incorreta. Advogado comum é expressamente proibido pela CLT nesse procedimento."}, fund:"Art. 855-B, CLT: o processo de homologação de acordo extrajudicial é instaurado mediante petição conjunta, sendo obrigatória a representação das partes por advogados distintos. Vedado o advogado comum. Sem jus postulandi.", caqui:"A FGV continua cobrando: acordo extrajudicial trabalhista = petição conjunta + advogados distintos obrigatórios. Sem jus postulandi (não é qualquer situação trabalhista). Sem advogado comum (a CLT proíbe expressamente). O jus postulandi existe em reclamações trabalhistas comuns, mas não nesse procedimento específico."},
  {num:19, exame:"XXXI Exame — 2020", titulo:"Procedimento do IDPJ na Execução Trabalhista", enunciado:"Após tentar executar judicialmente seu ex-empregador (a empresa Tecidos Suaves Ltda.) sem sucesso, o credor trabalhista Rodrigo instaurou o incidente de desconsideração da personalidade jurídica, objetivando direcionar a execução contra os sócios da empresa, o que foi aceito pelo magistrado.", comando:"De acordo com a CLT, assinale a opção que indica o ato seguinte.", gabarito:"B", alt:{"A": "O sócio será citado por oficial de justiça para pagar a dívida em 48 horas.", "B": "O sócio será citado para manifestar-se e requerer as provas cabíveis no prazo de 15 dias.", "C": "O juiz determinará de plano o bloqueio de bens e valores do sócio, posto que desnecessária a sua citação ou intimação.", "D": "Será conferida vista prévia ao Ministério Público do Trabalho, para que o parquet diga se concorda com a desconsideração pretendida."}, fb:{"A": "Incorreta. O sócio não é citado diretamente para pagar a dívida — primeiro ele precisa exercer seu direito de defesa no incidente.", "B": "Correta! Art. 855-A, CLT + art. 135, CPC: instaurado o IDPJ, o sócio deve ser citado para manifestar-se e requerer as provas que entender cabíveis, no prazo de 15 dias. Apenas após a instrução e decisão do incidente é que, se procedente, ele será incluído na execução.", "C": "Incorreta. Bloqueio imediato sem contraditório violaria o due process of law. O sócio tem direito ao contraditório antes de qualquer constrição patrimonial.", "D": "Incorreta. Não há necessidade de oitiva prévia obrigatória do Ministério Público do Trabalho nessa hipótese."}, fund:"Art. 855-A, CLT + art. 135, CPC (aplicação subsidiária): instaurado o incidente de desconsideração da personalidade jurídica, o sócio será citado para manifestar-se e requerer as provas cabíveis no prazo de 15 dias.", caqui:"IDPJ: sequência obrigatória. (1) Instaurado o incidente; (2) Cita o sócio; (3) Sócio tem 15 dias para se defender; (4) Instrução; (5) Decisão; (6) Se procedente: sócio entra na execução. Não pode bloquear bens antes da citação — isso violaria o contraditório. Não precisa de MPT. O sócio tem direito de se defender antes de qualquer constrição patrimonial."},
  {num:20, exame:"XXX Exame — 2019", titulo:"Recurso Contra Decisão que Rejeita Homologação de Acordo Extrajudicial", enunciado:"Wilma foi dispensada sem justa causa e recebeu a indenização correspondente do ex-empregador. Ela, no entanto, alega ter direito a uma equiparação salarial com um colega que realizava as mesmas atividades. Em razão disso, Wilma procura você e, com sua assessoria, dá início a um acordo extrajudicial com o ex-empregador. O acordo é materializado em documento, especificando o valor e a identificação da parcela, sendo assinado pelas partes e seus respectivos advogados, e levado à Justiça do Trabalho para homologação. Contudo, a juíza do caso nega-se a homologar o acordo, argumentando que ele seria lesivo à trabalhadora, proferindo decisão nesse sentido.", comando:"Diante disso, e de acordo com a norma legal, assinale a medida processual adequada para buscar a reforma da decisão.", gabarito:"B", alt:{"A": "Não há medida cabível, por se tratar de decisão interlocutória.", "B": "Recurso Ordinário.", "C": "Mandado de Segurança.", "D": "Novo pedido de homologação de acordo extrajudicial idêntico, mas agora dirigido para outra Vara."}, fb:{"A": "Incorreta. Há medida cabível — a CLT prevê expressamente o recurso ordinário contra a decisão que nega a homologação do acordo extrajudicial.", "B": "Correta! Art. 855-D, CLT: no prazo de 15 dias a contar da distribuição da petição, o juiz analisará o acordo, podendo indeferi-lo apenas por motivação e, caso denegue a homologação, da sentença cabe recurso ordinário.", "C": "Incorreta. Mandado de segurança só é cabível quando não há recurso específico previsto em lei. Aqui existe recurso ordinário = mandado de segurança é descabido.", "D": "Incorreta. Não se pode simplesmente redistribuir a mesma petição para outra Vara. O recurso ordinário é o caminho correto."}, fund:"Art. 855-D, CLT: no prazo de 15 dias a contar da distribuição da petição, o juiz analisará o acordo, podendo indeferi-lo e, em caso de indeferimento, da sentença que não homologar o acordo caberá recurso ordinário.", caqui:"O juiz pode negar a homologação? Sim. O que fazer? Recurso Ordinário. É a regra expressa do art. 855-D da CLT. Não é mandado de segurança (só cabe quando não há recurso próprio). Não é interlocutória irrecorrível (existe previsão expressa). E não se redistribui para outra Vara (absurdo processual). Recurso Ordinário = caminho correto."},
  {num:21, exame:"XXX Exame — 2019", titulo:"Rito Aplicável com Ente Público no Polo Passivo", enunciado:"Em sede de reclamação trabalhista proposta por Sávio, os pedidos liquidados somaram valor inferior a 40 salários mínimos nacionais. A ação foi movida em face do ex-empregador e da União, em razão de alegação de responsabilidade subsidiária.", comando:"Sobre o caso apresentado, assinale a opção que indica o procedimento a ser seguido.", gabarito:"B", alt:{"A": "A ação correrá sob o rito sumaríssimo, pois cabível o rito especial para qualquer parte na Justiça do Trabalho, desde que o valor da causa seja compatível.", "B": "A ação correrá sob o rito ordinário, porque, em que pese o valor da causa, figura ente de direito público no polo passivo.", "C": "A ação correrá no rito ordinário, mas, caso a primeira ré não seja encontrada, não será possível realizar a citação por edital, em vista de a segunda ré ser a União.", "D": "A ação correrá no rito sumaríssimo, e, em caso de prova testemunhal, cada parte terá direito a ouvir até três testemunhas."}, fb:{"A": "Incorreta. O valor da causa não é o único critério para o sumaríssimo — a presença de ente público no polo passivo afasta esse rito.", "B": "Correta! Art. 852-A, parágrafo único, CLT: o procedimento sumaríssimo não se aplica quando é parte a Administração Pública direta, autárquica e fundacional. A União é ente de direito público = afastado o sumaríssimo = rito ordinário.", "C": "Incorreta. No rito ordinário a citação por edital É possível — ao contrário do sumaríssimo (que veda a citação por edital). A presença da União não proíbe a citação por edital contra outros réus.", "D": "Incorreta. A ação não correrá no rito sumaríssimo. E no sumaríssimo são 2 testemunhas por parte (não 3)."}, fund:"Art. 852-A, parágrafo único, CLT: ficam excluídas do procedimento sumaríssimo as demandas em que é parte a Administração Pública direta, autárquica e fundacional. A União é ente público = exclusão do sumaríssimo = rito ordinário.", caqui:"União no polo passivo = sempre rito ordinário. O valor da causa pode ser de R$ 1,00 — se tiver União (ou qualquer ente público) como ré, vai para o ordinário. E atenção ao detalhe da alternativa C: a vedação à citação por edital é característica do SUMARÍSSIMO, não do ordinário. No ordinário, cita por edital normalmente."},
  {num:22, exame:"XXIX Exame — 2019", titulo:"Recurso Contra Sentença que Rejeita Homologação de Acordo Extrajudicial", enunciado:"Augusto foi empregado de uma lavanderia por 2 anos, tendo sido desligado em setembro de 2018. Após receber as verbas da ruptura, procurou um advogado com a intenção de ajuizar reclamação trabalhista para postular horas extras não recebidas durante o pacto laboral. O advogado de Augusto entrou em contato com a ex-empregadora na tentativa de formular um acordo, que, após debatido e negociado, teve sucesso e foi reduzido a termo. Então, as partes ajuizaram uma homologação de acordo extrajudicial na Justiça do Trabalho, em petição conjunta assinada pelo advogado de cada requerente, mas que não foi homologado pelo juiz, por este entender que o valor da conciliação era desfavorável ao trabalhador. Desse modo, o magistrado extinguiu o feito sem resolução do mérito.", comando:"Diante da situação e dos termos da CLT, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Agiu corretamente o juiz, porque não há previsão desse tipo de demanda na Justiça do Trabalho.", "B": "As partes poderão interpor recurso ordinário da decisão que negou a homologação desejada.", "C": "Augusto e seu ex-empregador deverão propor novamente a ação, que deverá ser levada à livre distribuição para outro juízo.", "D": "Nada poderá ser feito na ação proposta, porque o juiz não é obrigado a homologar acordo."}, fb:{"A": "Incorreta. O procedimento de homologação de acordo extrajudicial trabalhista está expressamente previsto nos arts. 855-B a 855-E da CLT.", "B": "Correta! Art. 855-D, CLT: da sentença que não homologar o acordo extrajudicial cabe recurso ordinário. As partes podem buscar a reforma da decisão perante o Tribunal Regional do Trabalho.", "C": "Incorreta. Não se redistribui para outra Vara. O recurso ordinário é o caminho correto.", "D": "Incorreta. Embora o juiz não seja obrigado a homologar, a decisão de indeferimento é recorrível via recurso ordinário."}, fund:"Art. 855-D, CLT: o juiz pode homologar ou não o acordo, mas, caso indeferido, da sentença cabe recurso ordinário para o Tribunal Regional do Trabalho.", caqui:"O juiz pode negar a homologação? Pode. Mas não é a última palavra. O recurso ordinário permite que o TRT revise a decisão. A CLT criou um sistema: o juiz avalia, pode negar, mas a parte tem recurso. Não faz sentido ter apenas o caminho de 'tentar em outra vara' — isso violaria a distribuição processual e a preclusão."},
  {num:23, exame:"XXIX Exame — 2019", titulo:"Desistência da Ação Após Apresentação da Contestação Eletrônica", enunciado:"O réu, em sede de reclamação trabalhista, ajuizada em 20/04/2018, apresentou defesa no processo eletrônico, a qual não foi oferecida sob sigilo. Feito o pregão, logo após a abertura da audiência, a parte autora manifestou interesse em desistir da ação.", comando:"Sobre a desistência da ação pela parte autora, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "O juiz deverá, imediatamente, homologar a desistência.", "B": "Não é possível desistir da ação após a propositura desta.", "C": "Oferecida a contestação, ainda que eletronicamente, o reclamante não poderá, sem o consentimento do reclamado, desistir da ação.", "D": "O oferecimento da defesa pelo réu em nada se relaciona à questão da desistência de pedidos ou da demanda."}, fb:{"A": "Incorreta. A desistência não é automática após a contestação — precisa da concordância do réu.", "B": "Incorreta. É possível desistir da ação, mas após a contestação depende da concordância do réu.", "C": "Correta! Art. 841, §3º, CLT: o protocolo eletrônico da defesa equivale ao oferecimento da contestação. Após isso, aplica-se o art. 485, §4º, CPC subsidiariamente: a desistência da ação depende da concordância do réu.", "D": "Incorreta. O oferecimento da contestação é exatamente o marco que altera a dinâmica da desistência — está diretamente relacionado."}, fund:"Art. 841, §3º, CLT (Reforma 2017): o protocolo eletrônico da defesa sem sigilo equivale à contestação apresentada. Art. 485, §4º, CPC (aplicação subsidiária): oferecida a contestação, a desistência da ação depende do consentimento do réu.", caqui:"Contestação eletrônica = contestação apresentada. Isso é o que o art. 841, §3º diz. E depois da contestação, a regra do CPC se aplica subsidiariamente: precisa da concordância do réu para desistir. O réu pode ter interesse em que o processo continue (talvez queira provar que não devia nada e obter improcedência). Por isso, depois que contestou, a desistência não é unilateral."},
  {num:24, exame:"XXIX Exame — 2019", titulo:"Preposto Não Empregado e Revelia", enunciado:"Em março de 2019, durante uma audiência trabalhista que envolvia a sociedade empresária ABC S/A, o juiz indagou à pessoa que se apresentou como preposto se ela era empregada da empresa, recebendo como resposta que não. O juiz, então, manifestou seu entendimento de que uma sociedade anônima deveria, obrigatoriamente, fazer-se representar por empregado, concluindo que a sociedade empresária não estava adequadamente representada. Decretou, então, a revelia, excluiu a defesa protocolizada e sentenciou o feito na própria audiência, julgando os pedidos inteiramente procedentes.", comando:"Diante desse quadro e do que prevê a CLT, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Nada há a ser feito, porque uma S/A, por exceção, precisa conduzir um empregado para representá-la.", "B": "O advogado da ré deverá interpor recurso ordinário no prazo de 8 dias, buscando anular a sentença, pois o preposto não precisa ser empregado da reclamada.", "C": "O advogado da ré deverá impetrar mandado de segurança, porque a exigência de que o preposto seja empregado, por não ser prevista em Lei, violou direito líquido e certo da empresa.", "D": "Uma vez que a CLT faculta ao juiz aceitar ou não como preposto pessoa que não seja empregada, o advogado deverá formular um pedido de reconsideração judicial."}, fb:{"A": "Incorreta. A Reforma 2017 eliminou a exigência de o preposto ser empregado para QUALQUER empresa — não existe essa exceção para S/A.", "B": "Correta! Art. 843, §3º, CLT (Reforma 2017): o preposto não precisa ser empregado da parte reclamada. O juiz errou ao declarar revelia. O recurso cabível é o recurso ordinário no prazo de 8 dias, buscando anular a sentença.", "C": "Incorreta. O mandado de segurança não é o caminho adequado — existe recurso próprio (recurso ordinário). O MS é subsidiário.", "D": "Incorreta. Não é 'faculdade do juiz'. A lei autoriza expressamente o preposto não empregado — não há discricionariedade judicial nesse ponto."}, fund:"Art. 843, §3º, CLT (Reforma 2017): o preposto não precisa ser empregado da parte reclamada. Art. 895, I, CLT: das decisões definitivas ou terminativas das Varas cabe recurso ordinário, no prazo de 8 dias.", caqui:"A Reforma 2017 mudou: preposto não precisa ser empregado. Ponto. O juiz estava aplicando a regra antiga (revogada). O caminho correto: recurso ordinário em 8 dias para anular a sentença. Não é mandado de segurança (tem recurso próprio). Não é pedido de reconsideração (não existe pedido de reconsideração em processo trabalhista como regra)."},
  {num:25, exame:"XXVII Exame — 2018", titulo:"Rito Sumaríssimo — Ente Público no Polo Passivo", enunciado:"Juca ajuizou ação trabalhista em face da sua ex-empregadora, empresa privada do ramo de mineração. Paulo também ajuizou ação, mas em face de seu ex-empregador, uma empresa de prestação de serviços, e do Município de Nova Iguaçu, no Rio de Janeiro, para quem prestou serviços, requerendo a responsabilidade subsidiária. Os respectivos advogados atribuíram o valor correspondente a 20 salários mínimos à causa de Juca e de 15 salários mínimos à causa de Paulo.", comando:"Diante disso, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "A causa de Juca correrá sob o procedimento sumaríssimo e a de Paulo, sob o ordinário.", "B": "Ambas as causas correrão sob o procedimento sumaríssimo.", "C": "Ambas as causas correrão sob o procedimento ordinário.", "D": "A causa de Juca correrá sob o procedimento ordinário e a de Paulo, sob o sumaríssimo."}, fb:{"A": "Correta! Juca: empresa privada + valor de 20 salários mínimos (abaixo de 40 SM) = rito sumaríssimo. Paulo: empresa privada + Município no polo passivo. A presença do Município (ente público) afasta o sumaríssimo = rito ordinário. Cada caso tem seu rito correto.", "B": "Incorreta. Paulo tem o Município no polo passivo = vedado o sumaríssimo.", "C": "Incorreta. Juca tem apenas empresa privada e valor compatível = sumaríssimo se aplica.", "D": "Incorreta. Inverteu os ritos — Juca vai para sumaríssimo, Paulo vai para ordinário."}, fund:"Art. 852-A, CLT: o procedimento sumaríssimo se aplica a causas de até 40 salários mínimos contra partes privadas. Art. 852-A, parágrafo único, CLT: ficam excluídas as demandas em que é parte a Administração Pública direta, autárquica e fundacional. Município = ente público = exclusão do sumaríssimo.", caqui:"Dois cenários, dois ritos diferentes: JUCA = empresa privada + menos de 40 SM = sumaríssimo. PAULO = empresa privada + Município (ente público) = ordinário (a presença do Município basta para afastar o sumaríssimo, não importa o valor da causa). Esta é a questão clássica do tema — a FGV voltou várias vezes a esse ponto."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação didática do Professor Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn mr" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn mr sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';document.getElementById('bu'+i).className='btn mr';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
</body>
</html>
